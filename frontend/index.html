<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E3A8A">
  <meta name="description" content="社區志工居家訪視電子化填報系統，安全簡便的行動端平台。">
  <title>志工訪視系統 — 登入</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================== 登入頁面 ======================== -->
<main class="login-page">

  <div class="login-card">

    <!-- Hero 區塊 -->
    <div class="login-hero">
      <div class="login-logo" aria-hidden="true">🏠</div>
      <h1 class="login-title">志工訪視系統</h1>
      <p class="login-subtitle">社區居家訪視電子化平台</p>
    </div>

    <!-- 登入表單 -->
    <div class="login-form">

      <!-- 身分證字號末三碼 -->
      <div class="form-group">
        <label class="form-label" for="idCardInput">
          🪪 身分證字號末三碼 <span class="req">*</span>
        </label>
        <input
          type="text"
          class="form-input"
          id="idCardInput"
          maxlength="3"
          placeholder="請輸入身分證字號末 3 碼（例：182）"
          autocomplete="off"
          aria-required="true"
          style="text-transform: uppercase;"
        >
      </div>

      <!-- 手機末三碼 -->
      <div class="form-group">
        <label class="form-label" for="phoneInput">
          📱 手機號碼末三碼 <span class="req">*</span>
        </label>
        <input
          type="tel"
          class="form-input"
          id="phoneInput"
          maxlength="3"
          pattern="[0-9]{3}"
          placeholder="請輸入手機號碼末 3 碼"
          inputmode="numeric"
          autocomplete="off"
          aria-required="true"
        >
      </div>

      <!-- 姓名重合核對選單 (預設隱藏) -->
      <div id="disambiguationContainer" class="form-group hidden anim-slide-up">
        <label class="form-label" for="disambiguationSelect">
          👤 發現重複的人員，請選擇您的姓名與分隊 <span class="req">*</span>
        </label>
        <select class="form-select" id="disambiguationSelect">
          <option value="">— 請選擇您的姓名與所屬單位 —</option>
        </select>
      </div>

      <!-- 錯誤訊息 -->
      <div class="field-error hidden" id="loginError" role="alert" aria-live="polite">
        ⚠️ <span id="loginErrorText"></span>
      </div>

      <!-- 登入按鈕 -->
      <button
        class="btn btn-primary btn-full btn-lg"
        id="loginBtn"
        onclick="handleLogin()"
        aria-label="進入填寫系統"
      >
        <span id="loginBtnIcon">🔓</span>
        <span id="loginBtnText">進入填寫系統</span>
      </button>

    </div><!-- /.login-form -->

    <!-- 狀態列 -->
    <div class="login-footer">
      <span class="status-dot online" aria-hidden="true"></span>
      系統正常運行中 &nbsp;·&nbsp; 填寫時請保持網路連線
    </div>

  </div><!-- /.login-card -->

  <p style="margin-top:20px;color:rgba(255,255,255,.4);font-size:.75rem;">
    志工訪視系統 v1.0
  </p>

</main>

<script src="app.js"></script>
<script>
  // ─── 頁面初始化 ───────────────────────────────────────────
  async function init() {
    // 若已登入，直接跳轉表單頁
    if (Session.get()) {
      window.location.href = 'form.html';
      return;
    }
  }

  // ─── 登入處理 ─────────────────────────────────────────────
  async function handleLogin() {
    const idCardInput    = document.getElementById('idCardInput');
    const phoneInput     = document.getElementById('phoneInput');
    const disambigSelect = document.getElementById('disambiguationSelect');
    const disambigCont   = document.getElementById('disambiguationContainer');
    const loginBtn       = document.getElementById('loginBtn');
    const loginError     = document.getElementById('loginError');
    const loginErrorText = document.getElementById('loginErrorText');

    const idCard = idCardInput.value.trim().toUpperCase();
    const phone  = phoneInput.value.trim();
    const name   = disambigSelect.value.trim(); // 只有當選單顯示且使用者選取時，才會有此值

    // 隱藏舊錯誤
    loginError.classList.add('hidden');
    phoneInput.style.borderColor = '';
    idCardInput.style.borderColor = '';
    disambigSelect.style.borderColor = '';

    // 驗證
    if (idCard.length !== 3) {
      _showError('請輸入身分證字號末 3 碼', idCardInput);
      return;
    }
    if (!/^\d{3}$/.test(phone)) {
      _showError('手機末三碼須為 3 位數字', phoneInput);
      return;
    }

    // 如果出現重複人名，且使用者還沒選
    if (!disambigCont.classList.contains('hidden') && !name) {
      _showError('請選擇您的姓名與所屬單位', disambigSelect);
      return;
    }

    // 送出驗證
    loginBtn.disabled = true;
    document.getElementById('loginBtnIcon').textContent = '⏳';
    document.getElementById('loginBtnText').textContent = '驗證中...';

    try {
      // 呼叫 API：如果需要核對則 name 傳空，否則傳選取的 name
      const res = await API.verifyLogin(idCard, phone, name);

      if (res.success) {
        Session.set({ ...res.user, loginTime: new Date().toISOString() });
        Toast.success(`歡迎，${res.user.name}！`);

        // 短暫停頓後跳轉
        document.getElementById('loginBtnIcon').textContent = '✅';
        document.getElementById('loginBtnText').textContent = '驗證成功，正在進入...';

        setTimeout(() => { window.location.href = 'form.html'; }, 700);

      } else if (res.needNameDisambiguation) {
        // 重重複名稱處理：填入下拉選單
        disambigSelect.innerHTML = '<option value="">— 請選擇您的姓名與所屬單位 —</option>';
        res.candidates.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.name;
          opt.textContent = `${c.name}（${c.branch}）`;
          disambigSelect.appendChild(opt);
        });

        disambigCont.classList.remove('hidden');
        Toast.warning('發現重複資料，請在下方選單確認您的姓名與分隊！');
        _resetBtn();
        disambigSelect.focus();

      } else {
        _showError(res.error || '驗證失敗，請確認資料是否正確');
        _resetBtn();
      }

    } catch (err) {
      _showError('連線失敗：' + err.message + '（請確認網路）');
      _resetBtn();
    }

    function _showError(msg, focusEl) {
      loginErrorText.textContent = msg;
      loginError.classList.remove('hidden');
      if (focusEl) {
        focusEl.style.borderColor = 'var(--c-danger)';
        focusEl.focus();
        setTimeout(() => focusEl.style.borderColor = '', 3000);
      }
    }

    function _resetBtn() {
      loginBtn.disabled = false;
      document.getElementById('loginBtnIcon').textContent = '🔓';
      document.getElementById('loginBtnText').textContent = '進入填寫系統';
    }
  }

  // ─── 監聽輸入值改變（若使用者重新修改末三碼，應隱藏姓名選單） ─────
  function handleInputReset() {
    const disambigCont   = document.getElementById('disambiguationContainer');
    const disambigSelect = document.getElementById('disambiguationSelect');
    if (!disambigCont.classList.contains('hidden')) {
      disambigCont.classList.add('hidden');
      disambigSelect.innerHTML = '<option value="">— 請選擇您的姓名與所屬單位 —</option>';
    }
  }

  // ─── 初始掛載 ─────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const idCardInput = document.getElementById('idCardInput');
    const phoneInput  = document.getElementById('phoneInput');

    // 監聽 Enter 送出
    const submitOnEnter = (e) => {
      if (e.key === 'Enter') handleLogin();
    };
    phoneInput.addEventListener('keydown', submitOnEnter);
    idCardInput.addEventListener('keydown', submitOnEnter);

    // 監聽輸入重設
    idCardInput.addEventListener('input', handleInputReset);
    phoneInput.addEventListener('input', handleInputReset);

    init();
  });
</script>
</body>
</html>
