<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E3A8A">
  <meta name="description" content="社區志工居家訪視電子化填報系統，安全簡便的行動端平台。">
  <title>志工訪視系統 — 登入</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================== 登入頁面 ======================== -->
<main class="login-page">

  <div class="login-card">

    <!-- Hero 區塊 -->
    <div class="login-hero">
      <div class="login-logo" aria-hidden="true">🏠</div>
      <h1 class="login-title">志工訪視系統</h1>
      <p class="login-subtitle">社區居家訪視電子化平台</p>
    </div>

    <!-- 登入表單 -->
    <div class="login-form">

      <!-- 選擇分隊 -->
      <div class="form-group">
        <label class="form-label" for="branchSelect">
          🏢 選擇您的分隊 <span class="req">*</span>
        </label>
        <select class="form-select" id="branchSelect" onchange="handleBranchChange()" aria-required="true">
          <option value="">— 載入中... —</option>
        </select>
      </div>

      <!-- 選擇姓名 -->
      <div class="form-group">
        <label class="form-label" for="nameSelect">
          👤 選擇您的姓名 <span class="req">*</span>
        </label>
        <select class="form-select" id="nameSelect" aria-required="true" disabled>
          <option value="">— 請先選擇分隊 —</option>
        </select>
      </div>

      <!-- 身分證字號末三碼 -->
      <div class="form-group">
        <label class="form-label" for="idCardInput">
          🪪 身分證字號末三碼 <span class="req">*</span>
        </label>
        <input
          type="text"
          class="form-input"
          id="idCardInput"
          maxlength="3"
          placeholder="請輸入身分證字號末 3 碼（例：182）"
          autocomplete="off"
          aria-required="true"
          style="text-transform: uppercase;"
        >
      </div>

      <!-- 手機末三碼 -->
      <div class="form-group">
        <label class="form-label" for="phoneInput">
          📱 手機號碼末三碼 <span class="req">*</span>
        </label>
        <input
          type="tel"
          class="form-input"
          id="phoneInput"
          maxlength="3"
          pattern="[0-9]{3}"
          placeholder="請輸入手機號碼末 3 碼"
          inputmode="numeric"
          autocomplete="off"
          aria-required="true"
        >
        <!-- 錯誤訊息 -->
        <div class="field-error hidden" id="loginError" role="alert" aria-live="polite">
          ⚠️ <span id="loginErrorText"></span>
        </div>
      </div>

      <!-- 登入按鈕 -->
      <button
        class="btn btn-primary btn-full btn-lg"
        id="loginBtn"
        onclick="handleLogin()"
        aria-label="進入填寫系統"
      >
        <span id="loginBtnIcon">🔓</span>
        <span id="loginBtnText">進入填寫系統</span>
      </button>

    </div><!-- /.login-form -->

    <!-- 狀態列 -->
    <div class="login-footer">
      <span class="status-dot online" aria-hidden="true"></span>
      系統正常運行中 &nbsp;·&nbsp; 填寫時請保持網路連線
    </div>

  </div><!-- /.login-card -->

  <p style="margin-top:20px;color:rgba(255,255,255,.4);font-size:.75rem;">
    志工訪視系統 v1.0
  </p>

</main>

<script src="app.js"></script>
<script>
  // ─── 頁面初始化 ───────────────────────────────────────────
  async function init() {
    // 若已登入，直接跳轉表單頁
    if (Session.get()) {
      window.location.href = 'form.html';
      return;
    }
    await loadMembers();
  }

  // ─── 人員資料（全域） ─────────────────────────────────────
  let _allMembers = [];

  // ─── 載入人員名單 ─────────────────────────────────────────
  async function loadMembers() {
    const branchSelect = document.getElementById('branchSelect');
    branchSelect.innerHTML = '<option value="">— 載入中... —</option>';
    branchSelect.disabled = true;

    try {
      const res = await API.getAllMembers();
      if (!res.success) throw new Error(res.error);

      _allMembers = res.data || [];

      // 取得所有不重複的分隊名稱
      const branches = [...new Set(_allMembers.map(m => m.branch))].filter(Boolean);
      
      branchSelect.innerHTML = '<option value="">— 請選擇您的分隊 —</option>';
      branches.sort((a, b) => a.localeCompare(b, 'zh-TW')).forEach(b => {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        branchSelect.appendChild(opt);
      });
      branchSelect.disabled = false;

    } catch (err) {
      branchSelect.innerHTML = `<option value="">⚠️ 載入失敗，請重新整理</option>`;
      Toast.error('無法載入人員名單：' + err.message);
    }
  }

  // ─── 當選擇分隊改變時，動態更新人員名單 ─────────────────────
  function handleBranchChange() {
    const branchSelect = document.getElementById('branchSelect');
    const nameSelect   = document.getElementById('nameSelect');
    const selectedBranch = branchSelect.value;

    nameSelect.innerHTML = '';
    
    if (!selectedBranch) {
      nameSelect.innerHTML = '<option value="">— 請先選擇分隊 —</option>';
      nameSelect.disabled = true;
      return;
    }

    const filteredMembers = _allMembers.filter(m => m.branch === selectedBranch);
    
    nameSelect.innerHTML = '<option value="">— 請選擇您的姓名 —</option>';
    filteredMembers.sort((a, b) => a.name.localeCompare(b.name, 'zh-TW')).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = m.role !== '志工' ? `${m.name}（${m.role}）` : m.name;
      nameSelect.appendChild(opt);
    });
    nameSelect.disabled = false;
  }

  // ─── 登入處理 ─────────────────────────────────────────────
  async function handleLogin() {
    const branchSelect   = document.getElementById('branchSelect');
    const nameSelect     = document.getElementById('nameSelect');
    const idCardInput    = document.getElementById('idCardInput');
    const phoneInput     = document.getElementById('phoneInput');
    const loginBtn       = document.getElementById('loginBtn');
    const loginError     = document.getElementById('loginError');
    const loginErrorText = document.getElementById('loginErrorText');

    const name   = nameSelect.value.trim();
    const idCard = idCardInput.value.trim().toUpperCase();
    const phone  = phoneInput.value.trim();

    // 隱藏舊錯誤
    loginError.classList.add('hidden');
    phoneInput.style.borderColor = '';
    idCardInput.style.borderColor = '';
    nameSelect.style.borderColor = '';
    branchSelect.style.borderColor = '';

    // 驗證
    if (!branchSelect.value) {
      _showError('請選擇您的分隊', branchSelect);
      return;
    }
    if (!name) {
      _showError('請選擇您的姓名', nameSelect);
      return;
    }
    if (idCard.length !== 3) {
      _showError('請輸入身分證字號末 3 碼', idCardInput);
      return;
    }
    if (!/^\d{3}$/.test(phone)) {
      _showError('手機末三碼須為 3 位數字', phoneInput);
      return;
    }

    // 送出驗證
    loginBtn.disabled = true;
    document.getElementById('loginBtnIcon').textContent = '⏳';
    document.getElementById('loginBtnText').textContent = '驗證中...';

    try {
      const res = await API.verifyLogin(name, idCard, phone);

      if (res.success) {
        Session.set({ ...res.user, loginTime: new Date().toISOString() });
        Toast.success(`歡迎，${res.user.name}！`);

        // 短暫停頓後跳轉
        document.getElementById('loginBtnIcon').textContent = '✅';
        document.getElementById('loginBtnText').textContent = '驗證成功，正在進入...';

        setTimeout(() => { window.location.href = 'form.html'; }, 700);

      } else {
        _showError(res.error || '驗證失敗，請確認資料是否正確');
        _resetBtn();
      }

    } catch (err) {
      _showError('連線失敗：' + err.message + '（請確認網路）');
      _resetBtn();
    }

    function _showError(msg, focusEl) {
      loginErrorText.textContent = msg;
      loginError.classList.remove('hidden');
      if (focusEl) {
        focusEl.style.borderColor = 'var(--c-danger)';
        focusEl.focus();
        setTimeout(() => focusEl.style.borderColor = '', 3000);
      }
    }

    function _resetBtn() {
      loginBtn.disabled = false;
      document.getElementById('loginBtnIcon').textContent = '🔓';
      document.getElementById('loginBtnText').textContent = '進入填寫系統';
    }
  }

  // ─── 初始掛載 ─────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // Enter 鍵觸發登入
    const submitOnEnter = (e) => {
      if (e.key === 'Enter') handleLogin();
    };
    document.getElementById('phoneInput').addEventListener('keydown', submitOnEnter);
    document.getElementById('idCardInput').addEventListener('keydown', submitOnEnter);

    init();
  });
</script>
</body>
</html>
