<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E3A8A">
  <title>志工訪視系統 — 預覽確認</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ 頂部導覽列 ============ -->
<div class="top-bar" role="banner">
  <div class="top-bar-inner">
    <div>
      <div class="top-bar-title">📋 預覽確認</div>
      <div class="top-bar-subtitle">請核對資料後送出</div>
    </div>
    <button class="back-btn" onclick="window.history.back()" aria-label="返回修改">
      ← 返回修改
    </button>
  </div>
  <!-- 進度條固定 100% -->
  <div class="progress-bar" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-fill" style="width:100%"></div>
  </div>
</div>

<!-- ============ 主要內容 ============ -->
<div class="page-content">

  <!-- 提醒框 -->
  <div style="
    background:#FFFBEB; border:1px solid #FCD34D;
    border-radius:var(--r-md); padding:14px 18px;
    margin-bottom:var(--sp-4);
    display:flex; gap:10px; align-items:flex-start;"
    role="alert">
    <span aria-hidden="true" style="font-size:1.25rem;">⚠️</span>
    <p style="font-size:.85rem; color:#92400E; font-weight:500; line-height:1.5;">
      請仔細核對以下資料。<strong>送出後將無法修改</strong>，如有錯誤請點擊右上角「返回修改」。
    </p>
  </div>

  <!-- ── 填寫人資訊 ── -->
  <div class="card" id="cardSubmitter">
    <div class="card-body">
      <div class="section-header">
        <div class="section-icon" aria-hidden="true">📝</div>
        <div><div class="section-title">填寫人資訊</div></div>
      </div>
      <div id="submitterSection"></div>
    </div>
  </div>

  <!-- ── 案家基本資料 ── -->
  <div class="card mt-4" id="cardClient">
    <div class="card-body">
      <div class="section-header">
        <div class="section-icon" aria-hidden="true">👤</div>
        <div><div class="section-title">案家基本資料</div></div>
      </div>
      <div id="clientSection"></div>
    </div>
  </div>

  <!-- ── 訪視題目答題 ── -->
  <div class="card mt-4" id="cardAnswers">
    <div class="card-body">
      <div class="section-header">
        <div class="section-icon" aria-hidden="true">📋</div>
        <div><div class="section-title">訪視答題內容</div></div>
      </div>
      <div id="answersSection"></div>
    </div>
  </div>

  <!-- ── 受訪者手寫簽名 ── -->
  <div class="card mt-4" id="cardSignature">
    <div class="card-body">
      <div class="section-header" style="margin-bottom:12px;">
        <div class="section-icon" aria-hidden="true">✍️</div>
        <div>
          <div class="section-title">受訪者手寫簽名</div>
          <p class="text-muted" style="font-size:0.75rem;margin-top:2px;">請點選下方框格進行手寫簽名確認</p>
        </div>
      </div>
      
      <div id="signaturePreviewBox" onclick="openSignatureModal()" style="width:100%; height:120px; border:2px dashed var(--border); border-radius:var(--r-md); background:var(--bg-input); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; position:relative; transition: var(--transition); border-color:#94A3B8;">
        <span style="font-size:2.2rem; color:var(--text-muted); margin-bottom:4px;">✍️</span>
        <span style="font-size:0.875rem; color:var(--c-primary); font-weight:700;">點此開啟全螢幕手寫簽名</span>
      </div>
    </div>
  </div>

</div><!-- /.page-content -->

<!-- ============ 全螢幕手寫簽名 Modal ============ -->
<div id="signatureModal" class="fullscreen-modal hidden">
  <div class="fullscreen-modal-content">
    <div class="fullscreen-modal-header">
      <div>
        <span style="font-weight:800; font-size:1.05rem; color:var(--text-primary); display:block;">✍️ 請受訪者手寫簽名</span>
        <span style="font-size:0.75rem; color:var(--c-primary-light); font-weight:600; margin-top:2px; display:block;">🔄 建議將手機打橫書寫，簽名空間更大更便利！</span>
      </div>
    </div>
    <div class="fullscreen-canvas-container">
      <canvas id="signatureCanvas" class="signature-canvas"></canvas>
    </div>
    <div class="fullscreen-modal-footer">
      <button class="btn btn-secondary btn-lg" onclick="closeSignatureModal(false)" type="button">取消</button>
      <button class="btn btn-warning btn-lg" onclick="clearSignature()" type="button" style="background:#F59E0B; border-color:#F59E0B; color:#fff;">🧹 清除重寫</button>
      <button class="btn btn-success btn-lg" onclick="closeSignatureModal(true)" type="button" style="min-width:130px;">💾 確定儲存</button>
    </div>
  </div>
</div>

<!-- ============ 底部操作列 ============ -->
<div class="bottom-bar">
  <div class="bottom-bar-inner">
    <button class="btn btn-secondary" style="flex:0 0 auto;min-width:100px;"
            onclick="window.history.back()" aria-label="返回修改">
      ← 修改
    </button>
    <button class="btn btn-success btn-full btn-lg" id="submitBtn"
            onclick="handleSubmit()" aria-label="確認送出訪視紀錄">
      ✅ 確認送出
    </button>
  </div>
</div>

<!-- ============ 送出成功 Modal ============ -->
<div id="successModal" class="success-modal hidden" role="dialog" aria-modal="true"
     aria-labelledby="successTitle">
  <div class="success-modal-card">
    <div style="font-size:4rem;margin-bottom:var(--sp-4);" aria-hidden="true">🎉</div>
    <h2 id="successTitle"
        style="font-size:1.5rem;font-weight:800;color:var(--c-success);margin-bottom:var(--sp-2);">
      送出成功！
    </h2>
    <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:var(--sp-5);">
      訪視紀錄已成功儲存。感謝您的辛勤服務！
    </p>
    <div id="successMeta"
         style="background:var(--c-success-bg);border-radius:var(--r-sm);
                padding:12px;font-size:.875rem;color:#065F46;
                margin-bottom:var(--sp-6);font-weight:600;">
    </div>
    <button class="btn btn-primary btn-full" onclick="handleNewRecord()" aria-label="繼續填寫下一戶">
      ➕ 繼續填寫下一戶
    </button>
    <button class="btn btn-secondary btn-full mt-4" onclick="handleLogout()" aria-label="登出系統">
      → 登出系統
    </button>
  </div>
</div>

<script src="app.js"></script>
<script>
  // ─── 電子簽名板狀態變數 ──────────────────────────────────────
  let canvas, ctx;
  let isDrawing = false;
  let hasSigned = false;
  let signatureDataUrl = ''; // 儲存簽名 JPEG Base64

  // ─── 初始化：渲染所有預覽區塊 ──────────────────────────────
  function init() {
    const session = Session.require();
    if (!session) return;

    const data = FormStore.get();
    if (!data || !data.clientName) {
      Toast.error('找不到表單資料，請重新填寫');
      setTimeout(() => { window.location.href = 'form.html'; }, 2000);
      return;
    }

    renderSubmitter(session, data);
    renderClient(data);
    renderAnswers(data);
    initSignaturePad();
  }

  // ─── 渲染「填寫人資訊」 ──────────────────────────────────────
  function renderSubmitter(session, data) {
    const items = [
      { label: '主填寫人', value: session.name },
      { label: '所屬分隊', value: session.branch },
      { label: '訪視類型', value: `<span class="preview-tag" style="background:var(--c-primary);color:#fff;border:none;">${data.visitType || '防火宣導'}</span>` },
      {
        label: '協同志工',
        value: (data.teamMembers && data.teamMembers.length > 0)
          ? data.teamMembers.map(m => `<span class="preview-tag">${m}</span>`).join('')
          : '<span style="color:var(--text-muted)">本次獨立出訪</span>',
      },
      { label: '填寫時間', value: formatDateTime(new Date(data.timestamp)) },
    ];

    document.getElementById('submitterSection').innerHTML =
      items.map(previewItem).join('');
  }

  // ─── 渲染「案家基本資料」 ────────────────────────────────────
  function renderClient(data) {
    const items = [
      { label: '訪視日期', value: data.visitDate || '<span style="color:var(--text-muted)">未填寫</span>' },
      { label: '案主姓名', value: `${data.clientName || ''}（${data.clientGender || '男'}）` },
      { label: '聯絡電話', value: data.clientPhone || '<span style="color:var(--text-muted)">未填寫</span>' },
      { label: '居住地址', value: data.clientAddress },
      { label: 'GPS 座標',  value: data.gps
          ? `<span style="font-size:.8rem;font-family:monospace;">${data.gps}</span>`
          : '<span style="color:var(--text-muted)">未定位</span>' },
      { label: '房屋屋齡', value: `${data.houseAge || 0} 年` },
      { label: '住宅形式', value: `${data.residentialType || '一般住宅'}（${data.buildingStructure || 'RC'}，共 ${data.totalFloors || 0} 層，居住於 ${data.residingFloor || 0} 樓）` },
      { label: '家庭成員', value: `共 ${data.familySize || 0} 人（65歲以上: ${data.family65Plus || 0}人, 行動不便: ${data.familyDisabled || 0}人, 6歲以下: ${data.familyUnder6 || 0}人, 外籍人士: ${data.familyForeigner || 0}人）` }
    ];

    document.getElementById('clientSection').innerHTML =
      items.map(previewItem).join('');
  }

  // ─── 渲染「訪視答題內容」 ────────────────────────────────────
  function renderAnswers(data) {
    const questions = data.questions || [];
    const answers   = data.answers   || {};
    const container = document.getElementById('answersSection');

    if (questions.length === 0) {
      container.innerHTML = '<p class="text-muted text-sm">無訪視題目</p>';
      return;
    }

    container.innerHTML = questions.map(q => {
      const ans = answers[q.id];
      let displayValue = '';

      if (Array.isArray(ans) && ans.length > 0) {
        displayValue = ans.map(a => `<span class="preview-tag">${a}</span>`).join('');
      } else if (ans && String(ans).trim()) {
        displayValue = `<span class="answer-value">${escHtml(String(ans))}</span>`;
      } else {
        displayValue = `<span style="color:var(--c-danger)">⚠️ 未作答</span>`;
      }

      return `
        <div class="answer-row">
          <span class="answer-qid">${q.id}</span>
          <div class="answer-content">
            <div class="answer-q-text">${escHtml(q.content)}</div>
            <div>${displayValue}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ─── 預覽列 template ─────────────────────────────────────────
  function previewItem({ label, value }) {
    return `
      <div class="preview-item">
        <span class="preview-label">${label}</span>
        <span class="preview-value">${value}</span>
      </div>`;
  }

  // ─── 送出表單 ────────────────────────────────────────────────
  async function handleSubmit() {
    if (!signatureDataUrl) {
      Toast.warning('請點選下方的框格完成手寫簽名確認！');
      scrollToEl(document.getElementById('cardSignature'));
      return;
    }

    const session = Session.get();
    if (!session) return;

    const data    = FormStore.get();
    const btn     = document.getElementById('submitBtn');

    btn.disabled = true;
    btn.innerHTML = '<span style="animation:spin .75s linear infinite;display:inline-block;">⏳</span> &nbsp;送出中，請勿關閉頁面...';

    const signatureBase64 = signatureDataUrl;

    try {
      const record = {
        submitter:     data.submitter,
        branch:        data.branch,
        visitDate:     data.visitDate     || '',
        visitType:     data.visitType     || '防火宣導',
        clientName:    data.clientName,
        clientGender:  data.clientGender  || '男',
        clientPhone:   data.clientPhone   || '',
        clientAddress: data.clientAddress || '',
        gps:           data.gps           || '',
        houseAge:      data.houseAge      || 0,
        residentialType: data.residentialType || '一般住宅',
        totalFloors:   data.totalFloors   || 0,
        residingFloor: data.residingFloor || 0,
        buildingStructure: data.buildingStructure || 'RC',
        familySize:    data.familySize    || 0,
        family65Plus:  data.family65Plus  || 0,
        familyDisabled:data.familyDisabled|| 0,
        familyUnder6:  data.familyUnder6  || 0,
        familyForeigner:data.familyForeigner|| 0,
        teamMembers:   data.teamMembers   || [],
        answers:       data.answers       || {},
        signature:     signatureBase64,  // 簽名資料
      };

      const res = await API.submitForm(record);

      if (res.success) {
        FormStore.clear();
        if (res.offline) {
          document.getElementById('successTitle').textContent = '💾 已暫存本機！';
          document.getElementById('successMeta').innerHTML =
            `暫存狀態：離線儲存成功<br>系統將於恢復網路連線時，自動為您在背景同步上傳！`;
        } else {
          document.getElementById('successTitle').textContent = '送出成功！';
          document.getElementById('successMeta').textContent =
            `紀錄編號：#${res.id}  ｜  ${formatDateTime()}`;
        }
        document.getElementById('successModal').classList.remove('hidden');
      } else {
        Toast.error('送出失敗：' + (res.error || '未知錯誤'));
        _resetBtn();
      }

    } catch (err) {
      Toast.error('系統錯誤，請重試：' + err.message);
      _resetBtn();
    }

    function _resetBtn() {
      btn.disabled = false;
      btn.innerHTML = '✅ 確認送出';
    }
  }

  // ─── 初始化手寫畫布 ──────────────────────────────────────────
  function initSignaturePad() {
    canvas = document.getElementById('signatureCanvas');
    if (!canvas) return;
    ctx = canvas.getContext('2d');

    // 處理高解析度螢幕模糊問題
    resizeCanvas();

    // 畫筆屬性
    ctx.strokeStyle = '#1E3A8A';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // 滑鼠監聽
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);

    // 觸控監聽 (支援手機)
    canvas.addEventListener('touchstart', startDrawingTouch);
    canvas.addEventListener('touchmove', drawTouch);
    canvas.addEventListener('touchend', stopDrawing);
    
    window.addEventListener('resize', resizeCanvas);
  }

  function openSignatureModal() {
    const modal = document.getElementById('signatureModal');
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden'; // 鎖定背景滾動

    setTimeout(() => {
      resizeCanvas();
      if (!signatureDataUrl) {
        clearSignature();
      }
    }, 150);
  }

  function closeSignatureModal(save) {
    const modal = document.getElementById('signatureModal');
    modal.classList.add('hidden');
    document.body.style.overflow = ''; // 恢復網頁滾動

    if (save) {
      if (!hasSigned) {
        Toast.warning('未簽寫任何內容！');
        signatureDataUrl = '';
        document.getElementById('signaturePreviewBox').innerHTML = `
          <span style="font-size:2.2rem; color:var(--text-muted); margin-bottom:4px;">✍️</span>
          <span style="font-size:0.875rem; color:var(--c-primary); font-weight:700;">點此開啟全螢幕手寫簽名</span>
        `;
        return;
      }
      try {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.fillStyle = '#FFFFFF';
        tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        tempCtx.drawImage(canvas, 0, 0);
        signatureDataUrl = tempCanvas.toDataURL('image/jpeg', 0.5);

        const previewBox = document.getElementById('signaturePreviewBox');
        previewBox.innerHTML = `
          <img src="${signatureDataUrl}" style="max-height:100%; max-width:100%; object-fit:contain;" alt="Signature Preview" />
          <div style="position:absolute; bottom:6px; right:6px; background:rgba(0,0,0,0.6); color:#fff; font-size:10px; padding:2px 6px; border-radius:4px;">
            已簽名 (點此重簽)
          </div>
        `;
      } catch (e) {
        console.error(e);
        signatureDataUrl = canvas.toDataURL('image/png');
      }
    } else {
      if (!signatureDataUrl) {
        hasSigned = false;
      }
    }
  }

  function resizeCanvas() {
    if (!canvas) return;
    const rect = canvas.parentNode.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    ctx.scale(ratio, ratio);

    ctx.strokeStyle = '#1E3A8A';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }

  function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches.length === 0) return null;
    const touch = e.touches[0];
    return {
      x: touch.clientX - rect.left,
      y: touch.clientY - rect.top
    };
  }

  function startDrawing(e) {
    isDrawing = true;
    const pos = getMousePos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  function startDrawingTouch(e) {
    e.preventDefault();
    isDrawing = true;
    const pos = getTouchPos(e);
    if (!pos) return;
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  function draw(e) {
    if (!isDrawing) return;
    const pos = getMousePos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    hasSigned = true;
  }

  function drawTouch(e) {
    e.preventDefault();
    if (!isDrawing) return;
    const pos = getTouchPos(e);
    if (!pos) return;
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    hasSigned = true;
  }

  function stopDrawing() {
    isDrawing = false;
  }

  function clearSignature() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSigned = false;
  }

  // ─── 成功後繼續填下一戶 ──────────────────────────────────────
  function handleNewRecord() {
    document.getElementById('successModal').classList.add('hidden');
    window.location.href = 'form.html';
  }

  // ─── 登出 ────────────────────────────────────────────────────
  function handleLogout() {
    Session.clear();
    FormStore.clear();
    window.location.href = 'index.html';
  }

  // ─── 工具：HTML 跳脫（防 XSS） ──────────────────────────────
  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─── 掛載 ────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
